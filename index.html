<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Bosy!</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="birthday-card">
        <button id="surpriseBtn">Press Here</button>

        <div id="revealArea" class="hidden">
            <img src="image1.jpeg" alt="Birthday Person" class="profile-pic">
            
            <h1 class="birthday-text">Happy Birthday, <br><span id="name">Bosy</span>! 🎂</h1>
            
            <p class="arabic-message">
                بنت خالي الغالية.. <br>
                اليوم ليس مجرد عيد ميلاد، بل هو ذكرى مجيء السعادة لعالمنا! <br>
                كل سنة وأنتِ متألقة، ناجحة، وقريبة من كل أحلامك.. <br>
                عقبال 100 سنة من الفرح والمغامرات الجميلة معاً! 🥳🎂
            </p>
        </div>
    </div>

    <audio id="birthdayMusic" src="Wassa3.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
